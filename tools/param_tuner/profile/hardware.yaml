  mode: 3
  # p: 0.000325
  # i: 0.01465
  # b: 0.0000275
  # d: 0.000775

  # p: 0.000325
  # i: 0.01465 # dif angle
  # # b: 0.0000375 #summation
  # b: 0.0000595 #summation
  # # b: 0.0000425 #summation
  # d: 0.000295

  antiwindup: 1
  windup_gain: 10.0
  windup_dead_bind: 1.50

  p: 0.000325
  i: 0.01465 # dif angle
  b: 0.0000595 #summation
  d: 0.000295

  # p: 0.00
  # i: 0.0
  # b: 0.00
  # d: 0.00

  c: 0.0075
  # c: 0.0
  i_theta_tau: 0.08      # [s] 角度I低域化の一次LPF時定数（例: 0.08〜0.15）
  i_theta_slew: 10.0     # [/s] 角度Iバイアスの変化率制限（例: 10〜50）
  i_theta_max: 20.0      # [-]  角度Iバイアスの振幅上限（例: 5〜20）
  # theta_gate: 0.00875      # [rad] |eθ|が小さい終盤で効かせるゲートの閾値（例: 0.05〜0.15）
  theta_gate: 0.004375      # [rad] |eθ|が小さい終盤で効かせるゲートの閾値（例: 0.05〜0.15）
  omega_gate: 25.0      # [rad/s] |ω_ref|が低い時だけ効かせるゲート（例: 15〜40）

  mpc_q_ang: 500.0  # Angle error weight: HIGH for good tracking (terminal cost is 10x this!)
  mpc_q_vel: 125.0   # Velocity error weight: HIGH for damping to prevent oscillation
  mpc_b: 0.000475        # System gain: CRITICAL! Increase gradually (0.5→1→2→5→10)
  mpc_r: 0.01       # Control cost: SMALL to allow aggressive control
  mpc_horizon: 5    # Prediction horizon
  mpc_max_iter: 10  # QP solver iterations
  mpc_max_torque: 0.0025
  mpc_observer_k: 0.25  # Disturbance observer gain (0.01=slow, 0.05=default, 0.1-0.2=aggressive)

